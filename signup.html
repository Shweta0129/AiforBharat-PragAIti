<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PragAIti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                        <circle cx="24" cy="24" r="20" fill="#4F46E5" opacity="0.1"/>
                        <path d="M24 14L28 22H20L24 14Z" fill="#4F46E5"/>
                        <circle cx="24" cy="28" r="4" fill="#10B981"/>
                        <path d="M16 32C16 28 19 26 24 26C29 26 32 28 32 32" stroke="#4F46E5" stroke-width="2"/>
                    </svg>
                    <span>PragAIti</span>
                </div>
                <h1>Create Account</h1>
                <p>Join PragAIti healthcare platform</p>
            </div>
            
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label>I am a</label>
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="patient" checked onchange="toggleSignupFields()">
                            <div class="role-card">
                                <span class="role-icon">👤</span>
                                <span class="role-label">Patient</span>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="doctor" onchange="toggleSignupFields()">
                            <div class="role-card">
                                <span class="role-icon">👨‍⚕️</span>
                                <span class="role-label">Doctor</span>
                            </div>
                        </label>
                    </div>
                </div>
                
                <!-- Common Fields -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="input-field" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="input-field" placeholder="Enter your phone number" required>
                </div>
                
                <!-- Patient Fields -->
                <div id="patientFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" class="input-field" placeholder="Age">
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <select class="input-field">
                                <option value="">Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Blood Group</label>
                        <select class="input-field">
                            <option value="">Select</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Chronic Conditions (if any)</label>
                        <input type="text" class="input-field" placeholder="e.g., Diabetes, Hypertension">
                    </div>
                    
                    <div class="form-group">
                        <label>Allergies (if any)</label>
                        <input type="text" class="input-field" placeholder="e.g., Penicillin, Peanuts">
                    </div>
                </div>
                
                <!-- Doctor Fields -->
                <div id="doctorFields" style="display: none;">
                    <div class="form-group">
                        <label>Specialization</label>
                        <input type="text" class="input-field" placeholder="e.g., Cardiology, Pediatrics">
                    </div>
                    
                    <div class="form-group">
                        <label>Hospital/Clinic Name</label>
                        <input type="text" class="input-field" placeholder="Enter hospital or clinic name">
                    </div>
                    
                    <div class="form-group">
                        <label>Medical License Number</label>
                        <input type="text" class="input-field" placeholder="Enter license number">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="input-field" placeholder="Create a password" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="input-field" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-large btn-block">
                    Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
                <p><a href="landing.html">Back to Home</a></p>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
